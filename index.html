<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>DrawStihl</title>
</head>
<body>
    <div class="p-top-center">
        <button id="target-ui" aria-label="Toggle settings drawer">⚙️</button>
    </div>
    <div class="drawer-content" style="scroll-behavior: smooth; padding-bottom: 20px;">
        <!-- Drawer content here -->
    </div>
    <script>
        document.getElementById('target-ui').addEventListener('click', function() {
            // Code to toggle the settings drawer
        });

        // Improved touch handling for mobile
        const shapes = document.querySelectorAll('.shape');
        shapes.forEach(shape => {
            shape.addEventListener('touchstart', function(e) {
                e.preventDefault();
                // Handle touch start
                this.style.transform = 'scale(1.1)'; // Zoom effect
            });
            shape.addEventListener('touchend', function() {
                // Handle touch end
                this.style.transform = 'scale(1.0)'; // Reset zoom effect
            });
        });
    </script>
</body>
</html>
