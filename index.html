<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ArtRef - Помощник Художника</title>
    <style>
        :root {
            --primary: #FF5F5F;
            --bg-dark: #1f1f1f;
            --shape-selected: #4CAF50;
        }
        body {
            background-color: var(--bg-dark);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            overflow: hidden;
            margin: 0;
            color: white;
            position: fixed;
            width: 100vw;
            height: 100dvh;
        }
        .app-container {
            width: 100vw;
            height: 100dvh;
            position: relative;
            overflow: hidden;
        }

        #interaction-zone {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 10;
        }

        #placeholder {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            z-index: 2;
            pointer-events: none;
        }

        .img-layer {
            position: absolute;
            left: 50%; top: 50%;
            transform-origin: 50% 50%;
            max-width: none;
            max-height: none;
            pointer-events: none;
            display: none;
            will-change: transform, opacity, filter;
        }
        #ref-image { z-index: 3; }
        #user-image { z-index: 4; }

        #grid-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 5;
            display: none;
        }

        #canvas-shapes {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 6;
            cursor: crosshair;
        }

        .ui-element {
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.4s ease;
            z-index: 100;
        }

        .ui-hidden-state .hide-on-idle {
            opacity: 0;
            pointer-events: none !important;
        }

        .settings-drawer {
            position: absolute;
            top: 0; right: 0; width: 300px; height: 100%;
            background: white;
            z-index: 1000;
            transform: translateX(100%);
            transition: transform 0.3s ease;
            box-shadow: -5px 0 25px rgba(0,0,0,0.5);
            color: #333;
            pointer-events: auto;
            overflow-y: auto;
        }
        @media (max-width: 640px) { .settings-drawer { width: 85%; } }
        .settings-drawer.open { transform: translateX(0); }

        .drawer-handle {
            position: absolute;
            left: -48px; top: 80px; width: 48px; height: 48px;
            background: white; border-radius: 12px 0 0 12px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; color: var(--primary);
            pointer-events: auto;
            box-shadow: -2px 0 10px rgba(0,0,0,0.1);
        }

        .perimeter-panel {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
        }

        .edge-btn-container {
            width: 54px;
            height: 54px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: auto;
        }

        .edge-btn {
            width: 36px;
            height: 36px;
            background: #222;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #444;
            color: white;
            cursor: pointer;
        }

        .edge-btn.nudge-btn { background: var(--primary); border: none; }
        .edge-btn.nudge-btn.user-mode { background: #22c55e; }
        .edge-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2.5; }

        .p-top-left { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; }
        .p-top-center { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; }
        .p-bottom-center {
            position: absolute;
            bottom: calc(env(safe-area-inset-bottom, 0px) + 4px);
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            flex-direction: column;
            gap: 4px;
            align-items: center;
        }

        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px; width: 16px;
            border-radius: 50%;
            background: var(--primary);
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px;
            cursor: pointer; background: #e5e7eb;
            border-radius: 2px;
        }

        input[type=color] {
            width: 50px;
            height: 40px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .shape-btn {
            padding: 8px 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            background: white;
            cursor: pointer;
            font-size: 9px;
            font-weight: bold;
            text-transform: uppercase;
            color: #333;
            transition: all 0.2s;
        }

        .shape-btn:hover { background: #f0f0f0; }
        .shape-btn.active { background: var(--shape-selected); color: white; border-color: var(--shape-selected); }

        .color-input-wrapper {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title {
            font-size: 12px;
            font-weight: bold;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .hidden { display: none; }
        .text-2xl { font-size: 1.5rem; }
        .text-xs { font-size: 0.75rem; }
        .text-red-400 { color: #f87171; }
        .text-red-500 { color: #ef4444; }
        .text-gray-400 { color: #9ca3af; }
        .text-gray-600 { color: #4b5563; }
        .text-gray-700 { color: #374151; }
        .text-gray-800 { color: #1f2937; }
        .uppercase { text-transform: uppercase; }
        .font-bold { font-weight: 700; }
        .mb-2 { margin-bottom: .5rem; }
        .mb-1 { margin-bottom: .25rem; }
        .p-6 { padding: 1.5rem; }
        .pb-2 { padding-bottom: .5rem; }
        .pt-4 { padding-top: 1rem; }
        .space-y-6 > * + * { margin-top: 1.5rem; }
        .space-y-5 > * + * { margin-top: 1.25rem; }
        .space-y-2 > * + * { margin-top: .5rem; }
        .grid { display: grid; }
        .grid-cols-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .gap-2 { gap: .5rem; }
        .py-3 { padding-top: .75rem; padding-bottom: .75rem; }
        .border-t { border-top: 1px solid #e5e7eb; }
        .flex { display: flex; }
        .items-center { align-items: center; }
        .justify-between { justify-content: space-between; }

    </style>
</head>
<body>

<div class="app-container">
    <div id="placeholder" class="text-center">
        <p class="text-2xl font-bold text-white mb-2">ArtRef</p>
        <p class="text-xs text-red-400 uppercase">Загрузите референс</p>
    </div>

    <svg id="grid-overlay"></svg>
    <img id="ref-image" class="img-layer" alt="Референс">
    <img id="user-image" class="img-layer" alt="Пользовательский рисунок">
    <canvas id="canvas-shapes"></canvas>

    <div id="interaction-zone"></div>

    <div id="perimeter-panel" class="perimeter-panel ui-element hide-on-idle">
        <div class="p-top-left">
            <div class="edge-btn-container" onclick="toggleGrid()">
                <div class="edge-btn" id="grid-btn"><svg viewBox="0 0 24 24"><path d="M3 9h18M3 15h18M9 3v18M15 3v18" stroke="currentColor"/></svg></div>
            </div>
            <div class="edge-btn-container" onclick="resetAll()">
                <div class="edge-btn"><svg viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5" stroke="currentColor"/></svg></div>
            </div>
        </div>

        <div class="p-top-center">
            <div class="edge-btn-container" onclick="toggleUserVisibility()">
                <div class="edge-btn" id="vis-btn">
                    <svg id="eye-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </div>
            </div>
        </div>
    </div>

    <aside id="drawer" class="settings-drawer ui-element">
        <div class="drawer-handle" onclick="toggleDrawer()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
        </div>
        <div class="p-6 space-y-6">
            <h2 class="text-xl font-bold border-b pb-2 text-gray-800">Инструменты</h2>

            <div class="space-y-2">
                <p class="text-[10px] font-bold text-gray-400 uppercase">Загрузка слоев</p>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="document.getElementById('ref-input').click()" class="py-3 border-2 border-gray-100 rounded-xl text-[10px] font-bold uppercase text-gray-700 hover:bg-gray-50">Референс</button>
                    <button id="user-btn-load" onclick="document.getElementById('user-input').click()" class="py-3 border-2 border-gray-100 rounded-xl text-[10px] font-bold uppercase text-gray-700 hover:bg-gray-50 btn-disabled">Рисунок</button>
                </div>
                <input type="file" id="ref-input" class="hidden" accept="image/*" onchange="loadFile(this, 'ref')">
                <input type="file" id="user-input" class="hidden" accept="image/*" onchange="loadFile(this, 'user')">
            </div>

            <div class="space-y-5 pt-4 border-t">
                <div id="layer-name" class="text-xs font-bold text-red-500 uppercase">Настройка: Референс</div>

                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="text-[9px] uppercase text-gray-400">Прозрачность</label>
                        <span id="op-val" class="text-[10px] font-bold text-gray-600">100%</span>
                    </div>
                    <input type="range" id="op-slider" min="0" max="100" value="100" oninput="updateFilters()">
                </div>
            </div>

            <div class="space-y-5 pt-4 border-t">
                <div class="section-title">Геометрические фигуры</div>
                <div class="flex gap-1" style="flex-wrap: wrap;">
                    <button class="shape-btn" onclick="selectShapeTool('rectangle')" id="btn-rect">Прямоугольник</button>
                    <button class="shape-btn" onclick="selectShapeTool('circle')" id="btn-circle">Круг</button>
                    <button class="shape-btn" onclick="selectShapeTool('line')" id="btn-line">Линия</button>
                    <button class="shape-btn" onclick="selectShapeTool('triangle')" id="btn-triangle">Треугольник</button>
                </div>
                <button onclick="clearShapes()" class="py-3 border-2 border-red-200 rounded-xl text-[10px] font-bold uppercase text-red-500 hover:bg-red-50" style="width: 100%;">Удалить фигуры</button>
            </div>

            <div class="space-y-5 pt-4 border-t">
                <div class="section-title">Свойства фигур</div>

                <div>
                    <label class="text-[9px] uppercase text-gray-400">Цвет линии</label>
                    <div class="color-input-wrapper">
                        <input type="color" id="stroke-color" value="#000000" onchange="updateShapeStyles()">
                        <span id="stroke-color-text" class="text-[9px] text-gray-600" style="flex: 1;">#000000</span>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="text-[9px] uppercase text-gray-400">Толщина линии</label>
                        <span id="stroke-width-val" class="text-[10px] font-bold text-gray-600">2px</span>
                    </div>
                    <input type="range" id="stroke-width" min="1" max="20" value="2" oninput="updateShapeStyles(); document.getElementById('stroke-width-val').innerText = this.value + 'px';">
                </div>

                <div>
                    <label class="text-[9px] uppercase text-gray-400">Цвет заливки</label>
                    <div class="color-input-wrapper">
                        <input type="color" id="fill-color" value="#FFFFFF" onchange="updateShapeStyles()">
                        <span id="fill-color-text" class="text-[9px] text-gray-600" style="flex: 1;">#FFFFFF</span>
                    </div>
                </div>

                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="text-[9px] uppercase text-gray-400">Прозрачность</label>
                        <span id="shape-opacity-val" class="text-[10px] font-bold text-gray-600">100%</span>
                    </div>
                    <input type="range" id="shape-opacity" min="0" max="100" value="100" oninput="updateShapeStyles(); document.getElementById('shape-opacity-val').innerText = this.value + '%';">
                </div>
            </div>
        </div>
    </aside>
</div>

<script>
    let states = {
        ref: { x: window.innerWidth/2, y: window.innerHeight/2, s: 1, r: 0, opacity: 1, contrast: 100, brightness: 100 },
        user: { x: window.innerWidth/2, y: window.innerHeight/2, s: 1, r: 0, opacity: 0.8, contrast: 100, brightness: 100 }
    };

    let currentTarget = null;
    let isUserVisible = true;
    let gridVisible = false;
    let currentShapeTool = null;
    let isDrawing = false;
    let startX = 0;
    let startY = 0;
    let shapes = [];

    let shapeStyles = {
        strokeColor: '#000000',
        strokeWidth: 2,
        fillColor: '#FFFFFF',
        opacity: 1
    };

    const refEl = document.getElementById('ref-image');
    const userEl = document.getElementById('user-image');
    const zone = document.getElementById('interaction-zone');
    const placeholderEl = document.getElementById('placeholder');
    const userBtnLoadEl = document.getElementById('user-btn-load');
    const drawerEl = document.getElementById('drawer');
    const canvas = document.getElementById('canvas-shapes');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        redrawShapes();
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    function loadFile(input, type) {
        if (!input.files || !input.files[0]) return;
        const file = input.files[0];
        const reader = new FileReader();

        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const MAX_DIM = 1400;
                let w = img.width;
                let h = img.height;

                if (w > MAX_DIM || h > MAX_DIM) {
                    if (w > h) { h = Math.round(h * (MAX_DIM / w)); w = MAX_DIM; }
                    else { w = Math.round(w * (MAX_DIM / h)); h = MAX_DIM; }
                }

                canvas.width = w;
                canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);

                const dataUrl = canvas.toDataURL('image/jpeg', 0.8);
                const el = type === 'ref' ? refEl : userEl;
                el.src = dataUrl;
                el.style.display = 'block';
                placeholderEl.style.display = 'none';

                if (type === 'ref') {
                    userBtnLoadEl.classList.remove('btn-disabled');
                }

                saveState();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
        input.value = '';
    }

    function toggleDrawer() {
        drawerEl.classList.toggle('open');
    }

    function toggleUserVisibility() {
        isUserVisible = !isUserVisible;
        userEl.style.display = isUserVisible ? 'block' : 'none';
    }

    function toggleGrid() {
        gridVisible = !gridVisible;
    }

    function resetAll() {
        console.log('Reset');
    }

    function updateFilters() {
        console.log('Update filters');
    }

    function selectShapeTool(tool) {
        currentShapeTool = currentShapeTool === tool ? null : tool;
        document.getElementById('btn-rect').classList.toggle('active', currentShapeTool === 'rectangle');
        document.getElementById('btn-circle').classList.toggle('active', currentShapeTool === 'circle');
        document.getElementById('btn-line').classList.toggle('active', currentShapeTool === 'line');
        document.getElementById('btn-triangle').classList.toggle('active', currentShapeTool === 'triangle');
        canvas.style.cursor = currentShapeTool ? 'crosshair' : 'default';
    }

    function updateShapeStyles() {
        shapeStyles.strokeColor = document.getElementById('stroke-color').value;
        shapeStyles.strokeWidth = parseInt(document.getElementById('stroke-width').value);
        shapeStyles.fillColor = document.getElementById('fill-color').value;
        shapeStyles.opacity = parseInt(document.getElementById('shape-opacity').value) / 100;

        document.getElementById('stroke-color-text').innerText = shapeStyles.strokeColor.toUpperCase();
        document.getElementById('fill-color-text').innerText = shapeStyles.fillColor.toUpperCase();

        redrawShapes();
        saveState();
    }

    function drawShape(x1, y1, x2, y2, type, styles) {
        const width = x2 - x1;
        const height = y2 - y1;

        ctx.strokeStyle = styles.strokeColor;
        ctx.fillStyle = styles.fillColor;
        ctx.lineWidth = styles.strokeWidth;
        ctx.globalAlpha = styles.opacity;

        switch(type) {
            case 'rectangle':
                ctx.fillRect(x1, y1, width, height);
                ctx.strokeRect(x1, y1, width, height);
                break;
            case 'circle':
                const radius = Math.max(Math.abs(width), Math.abs(height)) / 2;
                const cx = x1 + width / 2;
                const cy = y1 + height / 2;
                ctx.beginPath();
                ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                ctx.fill();
                ctx.stroke();
                break;
            case 'line':
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
                break;
            case 'triangle':
                ctx.beginPath();
                ctx.moveTo(x1 + width / 2, y1);
                ctx.lineTo(x2, y2);
                ctx.lineTo(x1, y2);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                break;
        }

        ctx.globalAlpha = 1;
    }

    function redrawShapes() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        shapes.forEach(shape => {
            drawShape(shape.x1, shape.y1, shape.x2, shape.y2, shape.type, shape.styles);
        });
    }

    function clearShapes() {
        if (confirm('Удалить все фигуры?')) {
            shapes = [];
            redrawShapes();
            saveState();
        }
    }

    canvas.addEventListener('mousedown', (e) => {
        if (!currentShapeTool) return;
        isDrawing = true;
        startX = e.clientX;
        startY = e.clientY;
    });

    canvas.addEventListener('mousemove', (e) => {
        if (!isDrawing || !currentShapeTool) return;
        redrawShapes();
        drawShape(startX, startY, e.clientX, e.clientY, currentShapeTool, shapeStyles);
    });

    canvas.addEventListener('mouseup', (e) => {
        if (!isDrawing || !currentShapeTool) return;
        isDrawing = false;
        
        if (Math.abs(e.clientX - startX) > 5 || Math.abs(e.clientY - startY) > 5) {
            shapes.push({
                x1: startX,
                y1: startY,
                x2: e.clientX,
                y2: e.clientY,
                type: currentShapeTool,
                styles: { ...shapeStyles }
            });
        }

        redrawShapes();
        saveState();
    });

    function saveState() {
        const data = {
            shapes: shapes,
            shapeStyles: shapeStyles
        };
        try {
            localStorage.setItem('artref_shapes', JSON.stringify(data));
        } catch(e) {
            console.warn("Storage full", e);
        }
    }

    window.addEventListener('DOMContentLoaded', function() {
        try {
            const saved = localStorage.getItem('artref_shapes');
            if (saved) {
                const d = JSON.parse(saved);
                if (d.shapes) shapes = d.shapes;
                if (d.shapeStyles) shapeStyles = d.shapeStyles;
            }
        } catch(e) {
            console.error("Error loading state:", e);
        }

        document.getElementById('stroke-color').value = shapeStyles.strokeColor;
        document.getElementById('stroke-width').value = shapeStyles.strokeWidth;
        document.getElementById('fill-color').value = shapeStyles.fillColor;
        document.getElementById('shape-opacity').value = Math.round(shapeStyles.opacity * 100);

        redrawShapes();
    });

</script>

</body>
</html>
