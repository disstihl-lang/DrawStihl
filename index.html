<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>DrawStihl</title>
</head>
<body>
    <div class="p-top-center">
        <button id="target-ui" aria-label="Toggle settings drawer">⚙️</button>
    </div>
    
    <div id="drawer" class="drawer">
        <div class="drawer-content" style="scroll-behavior: smooth; padding-bottom: 20px;">
            <h2>Settings</h2>
            <p>Configure your drawing application here.</p>
            <!-- Add more settings content as needed -->
        </div>
    </div>

    <canvas id="canvas" width="800" height="600"></canvas>

    <script>
        // Toggle drawer functionality
        const drawerBtn = document.getElementById('target-ui');
        const drawer = document.getElementById('drawer');
        let isDrawerOpen = false;

        drawerBtn.addEventListener('click', function() {
            isDrawerOpen = !isDrawerOpen;
            if (isDrawerOpen) {
                drawer.classList.add('open');
                drawerBtn.setAttribute('aria-expanded', 'true');
            } else {
                drawer.classList.remove('open');
                drawerBtn.setAttribute('aria-expanded', 'false');
            }
        });

        // Canvas drawing functionality
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false;
        let lastX = 0;
        let lastY = 0;

        // Mouse events for drawing
        canvas.addEventListener('mousedown', (e) => {
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            lastX = e.clientX - rect.left;
            lastY = e.clientY - rect.top;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (!isDrawing) return;
            
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();
            
            lastX = x;
            lastY = y;
        });

        canvas.addEventListener('mouseup', () => {
            isDrawing = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isDrawing = false;
        });

        // Touch events for mobile drawing
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isDrawing = true;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            lastX = touch.clientX - rect.left;
            lastY = touch.clientY - rect.top;
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!isDrawing) return;
            
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            const y = touch.clientY - rect.top;
            
            ctx.beginPath();
            ctx.moveTo(lastX, lastY);
            ctx.lineTo(x, y);
            ctx.stroke();
            
            lastX = x;
            lastY = y;
        });

        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            isDrawing = false;
        });

        // Initialize canvas
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
    </script>
</body>
</html>
