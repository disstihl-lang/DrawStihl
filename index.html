<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shape Drawing</title>
    <script>
        function setupCanvas() {
            const canvas = document.getElementById('drawingCanvas');
            const context = canvas.getContext('2d');

            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            let shapes = [];

            canvas.addEventListener('click', (event) => {
                let shape = prompt('Enter shape (rectangle, circle, line, triangle):');
                let strokeColor = prompt('Enter stroke color:');
                let fillColor = prompt('Enter fill color:');
                let strokeWidth = parseInt(prompt('Enter stroke width:'), 10);
                let opacity = parseFloat(prompt('Enter opacity (0.0 - 1.0):'));
                let scale = parseFloat(prompt('Enter scale (1.0 = normal):'));
                let rotation = parseFloat(prompt('Enter rotation (in degrees):'));

                let x = event.clientX;
                let y = event.clientY;

                shapes.push({ shape, x, y, strokeColor, fillColor, strokeWidth, opacity, scale, rotation });
                drawShapes();
            });

            function drawShapes() {
                context.clearRect(0, 0, canvas.width, canvas.height);
                shapes.forEach(s => {
                    context.save();
                    context.translate(s.x, s.y);
                    context.rotate(s.rotation * Math.PI / 180);
                    context.scale(s.scale, s.scale);
                    context.globalAlpha = s.opacity;  

                    context.strokeStyle = s.strokeColor;
                    context.fillStyle = s.fillColor;
                    context.lineWidth = s.strokeWidth;

                    switch (s.shape) {
                        case 'rectangle':
                            context.fillRect(-50, -25, 100, 50);
                            context.strokeRect(-50, -25, 100, 50);
                            break;
                        case 'circle':
                            context.beginPath();
                            context.arc(0, 0, 50, 0, Math.PI * 2);
                            context.fill();
                            context.stroke();
                            break;
                        case 'line':
                            context.beginPath();
                            context.moveTo(-50, 0);
                            context.lineTo(50, 0);
                            context.stroke();
                            break;
                        case 'triangle':
                            context.beginPath();
                            context.moveTo(0, -50);
                            context.lineTo(50, 50);
                            context.lineTo(-50, 50);
                            context.closePath();
                            context.fill();
                            context.stroke();
                            break;
                    }
                    context.restore();
                });
            }

            drawShapes();
        }  
    </script>
</head>
<body onload="setupCanvas()">
    <canvas id="drawingCanvas"></canvas>
</body>
</html>
