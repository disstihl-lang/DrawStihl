name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org/   # ✅ фикс registry

      - name: Force npm registry
        run: npm config set registry https://registry.npmjs.org/   # ✅ дополнительная гарантия

      - name: Debug registry (optional)
        run: npm config get registry   # можно потом удалить

      - name: Install dependencies
        run: npm install   # ⚠️ заменил ci → install (нет package-lock)

      - name: Build
        run: npm run build

      - name: Validate built index.html
        run: |
          test -f dist/index.html
          ! grep -q 'src="/src/main.tsx"' dist/index.html
          grep -q 'assets/' dist/index.html

      - name: Deploy build artifacts to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
          single-commit: true
