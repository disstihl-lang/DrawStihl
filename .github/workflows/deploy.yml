name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Validate Pages source settings
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo
            const response = await github.rest.repos.getPages({ owner, repo })
            const source = response.data?.source || {}
            const branch = source.branch
            const path = source.path

            core.info(`Current Pages source: branch=${branch}, path=${path}`)

            if (branch !== 'gh-pages' || path !== '/') {
              core.setFailed(
                `GitHub Pages source must be gh-pages/(root). Current: ${branch}${path}. ` +
                `Fix in Settings → Pages before deploying.`
              )
            }

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Validate built index.html
        run: |
          test -f dist/index.html
          ! grep -q 'src="/src/main.tsx"' dist/index.html
          grep -q '/DrawStihl/assets/' dist/index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
